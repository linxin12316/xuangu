name: Daily Stock Review

on:
  schedule:
    # UTC 08:05 = 北京时间 16:05，周一-周五
    - cron: '5 8 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # 提前适配 Node.js 24（2026-06-16 起默认强制）
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run review
        env:
          SCKEY: ${{ secrets.SCKEY }}
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          TZ: Asia/Shanghai
        run: |
          python -m src.main review
