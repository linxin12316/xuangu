name: Evening Review

on:
  schedule:
    # UTC 10:23 = 北京时间 18:23，周一-周五（盘后所有数据稳定后跑）
    # 避开整点拥堵带 (:00 / :30)
    - cron: '23 10 * * 1-5'
  workflow_dispatch:
    inputs:
      force:
        description: '非交易日也强制运行(验证用)'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  evening:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run evening review
        env:
          SCKEY: ${{ secrets.SCKEY }}
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          TZ: Asia/Shanghai
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            python -m src.main evening --force
          else
            python -m src.main evening
          fi
