name: Weekly Backtest Summary

on:
  schedule:
    # UTC 09:47 = 北京时间 17:47，周日跑回测发周报
    # 注意:避开 :00 / :30 整点(GitHub 高负载时段会丢弃私有仓库的 schedule)
    - cron: '47 9 * * 0'
  workflow_dispatch:
    inputs:
      days:
        description: '回看天数（默认 14）'
        type: string
        default: '14'

permissions:
  contents: read

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backtest
        env:
          SCKEY: ${{ secrets.SCKEY }}
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          TZ: Asia/Shanghai
        run: |
          DAYS="${{ inputs.days }}"
          python -m src.backtest --days ${DAYS:-14}
