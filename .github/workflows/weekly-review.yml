name: Weekly Backtest Review

on:
  schedule:
    # UTC 00:00 = 北京时间 08:00，周日
    - cron: '0 0 * * 0'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backtest
        env:
          SCKEY: ${{ secrets.SCKEY }}
          TZ: Asia/Shanghai
        run: |
          python -m src.backtest
