name: Daily Stock Pick

on:
  schedule:
    # UTC 00:30 = 北京时间 08:30，周一-周五
    - cron: '30 0 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  pick:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pick
        env:
          SCKEY: ${{ secrets.SCKEY }}
          TZ: Asia/Shanghai
        run: |
          python -m src.main pick

      - name: Commit picks file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add picks/
          git diff --cached --quiet || git commit -m "chore: pick $(date +%F)"
          git push || true
