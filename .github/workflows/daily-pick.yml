name: Daily Stock Pick

on:
  schedule:
    # UTC 00:27 = 北京时间 08:27，周一-周五
    # 注意:避开 :00 / :30 整点(GitHub 高负载时段会丢弃私有仓库的 schedule)
    - cron: '27 0 * * 1-5'
  workflow_dispatch:
    inputs:
      force:
        description: '非交易日也强制运行(验证用)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  pick:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # 提前适配 Node.js 24（2026-06-16 起默认强制）
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pick
        env:
          SCKEY: ${{ secrets.SCKEY }}
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          TZ: Asia/Shanghai
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            python -m src.main pick --force
          else
            python -m src.main pick
          fi

      - name: Commit picks file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add picks/
          git diff --cached --quiet || git commit -m "chore: pick $(date +%F)"
          git push || true
